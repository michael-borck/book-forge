name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      # macOS: code-sign + notarize. electron-builder imports the signing
      # certificate itself from CSC_LINK / CSC_KEY_PASSWORD (no manual keychain
      # step - that approach hit keychain-partition codesign failures on the
      # Electron framework's resource files). scripts/notarize.js (the afterSign
      # hook) reads NOTARIZE_APPLE_*. The names are NOTARIZE_APPLE_* (not
      # APPLE_*) so electron-builder's own buggy auto-notarize wrapper doesn't
      # also fire.
      - name: Package Electron app (macOS)
        if: matrix.os == 'macos-latest'
        # An UNSET CSC_LINK secret arrives as an empty string, which
        # electron-builder treats as a certificate file path and dies on
        # ("not a file"). Unset it and disable identity discovery so the build
        # proceeds unsigned until real signing secrets are configured.
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "CSC_LINK not set - building unsigned"
          fi
          npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZE_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package Electron app (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.snap
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
          # Publish as a draft so the release can be reviewed before going public.
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
